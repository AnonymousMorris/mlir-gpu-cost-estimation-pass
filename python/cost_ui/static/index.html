<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MLIR Cost UI</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="editor-pane">
        <div class="toolbar">
          <h1>MLIR Cost UI</h1>
          <button id="parse-button" type="button">Parse</button>
        </div>
        <textarea id="mlir-input" spellcheck="false"></textarea>
        <p id="status" class="status"></p>
      </section>

      <section class="result-pane">
        <div class="cost-panel">
          <span class="label">Cost</span>
          <output id="cost-output">-</output>
        </div>

        <div class="equation-panel">
          <h2>Equation</h2>
          <pre id="equation-output">Paste generated @__cost_expr MLIR and parse it.</pre>
        </div>

        <div class="variables-panel">
          <h2>Variables</h2>
          <div id="variables"></div>
        </div>
      </section>
    </main>

    <script src="/static/app.js?v=20260521-parse-fix"></script>
  </body>
</html>
